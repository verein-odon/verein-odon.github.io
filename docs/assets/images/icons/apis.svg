        fill="none" stroke="url(#apis-gradient)" stroke-width="0.9" stroke-linejoin="round"/>
  <rect x="13" y="5" width="2" height="6" rx="1" ry="1"
        fill="none" stroke="url(#apis-gradient)" stroke-width="0.9" stroke-linejoin="round"/>
  <rect x="3" y="5.5" width="10" height="5"
        fill="none" stroke="url(#apis-gradient)" stroke-width="0.9" stroke-linejoin="round"/>

</svg>
