{% comment %} usage: include odmm-badge.html legal=source.odmm_legal technical=source.odmm_technical no_link="true" {% endcomment %}
{% if include.no_link %}
<span class="odmm-badge odmm-badge--expandable" title="ODON Open Data Maturity Model — Legal {{ include.legal }} · Technical {{ include.technical }}">
  <span class="odmm-badge__legal">Legal {{ include.legal }}</span><span class="odmm-badge__tech">Technical {{ include.technical }}</span><span class="odmm-badge__chevron"></span>
</span>
{% else %}
<span class="odmm-badge" title="ODON Open Data Maturity Model — Legal {{ include.legal }} · Technical {{ include.technical }}">
  <a href="/en/open-data/#odmm">
    <span class="odmm-badge__legal">Legal {{ include.legal }}</span><span class="odmm-badge__tech">Technical {{ include.technical }}</span>
  </a>
</span>
{% endif %}
